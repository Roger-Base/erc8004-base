name: Verify ERC-8004 Contracts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run verifier
        run: ./scripts/verify-contracts.sh
